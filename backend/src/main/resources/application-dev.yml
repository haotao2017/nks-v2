# 开发环境覆盖配置。
# 所有敏感值仍从环境变量注入，绝不在此写入明文密钥/密码。
spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    no.nks: DEBUG
    org.springframework.security: INFO
    # 需要排查 SQL 时打开下面两行
    # org.hibernate.SQL: DEBUG
    # org.hibernate.orm.jdbc.bind: TRACE
